<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASMARKAPP CARNICERIA</title>
    <style>
        :root {
            --primary: #7b1c1c;
            --primary-dark: #4e0f0f;
            --primary-light: #a83232;
            --secondary: #c9a84c;
            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --error: #c0392b;
            --disabled: #b0a090;
            --border: #e0d5c8;
            --text-main: #2c1a0e;
            --text-muted: #7a5c45;
            --label-color: #7b1c1c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            padding-bottom: 130px;
        }

        /* ── PORTADA ── */
        .cover {
            width: 100%;
            height: 220px;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* ── HEADER ── */
        header {
            background: var(--primary-dark);
            color: #fff;
            padding: 14px 15px;
            text-align: center;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--secondary);
        }

        main { padding: 18px 15px; max-width: 620px; margin: auto; }

        /* ── SECTION TITLE ── */
        .section-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── CARDS ── */
        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(80,30,10,0.07);
        }

        /* ── LABELS & INPUTS ── */
        label {
            font-size: 10px;
            color: var(--label-color);
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input[type=text], input[type=number] {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            font-size: 15px;
            margin-bottom: 6px;
            background: #fdf9f6;
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(123,28,28,0.12);
            background: #fff;
        }

        .invalid-selection {
            border: 2px solid var(--error) !important;
            background-color: #fff5f5 !important;
        }
        .error-msg {
            color: var(--error);
            font-size: 10px;
            font-weight: 700;
            display: none;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        /* ── CORTES LIST ── */
        .item-carne {
            border-bottom: 1px solid #f0e8e0;
            padding: 13px 0;
        }
        .item-carne:last-child { border-bottom: none; }
        .corte-name {
            font-weight: 600;
            font-size: 13.5px;
            color: var(--text-main);
            margin-bottom: 7px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .corte-name::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--secondary);
            flex-shrink: 0;
        }
        .precios-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .precio-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        /* ── BUTTONS ── */
        .btn-add {
            background: linear-gradient(135deg, var(--secondary) 0%, #b8923a 100%);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 11px;
            width: 100%;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 3px 10px rgba(180,130,50,0.35);
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-add:active { opacity: 0.85; transform: scale(0.98); }

        .btn-eliminar {
            color: var(--error);
            background: none;
            border: 1px solid #f5c6c6;
            border-radius: 7px;
            cursor: pointer;
            margin-top: 10px;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        .btn-eliminar:hover { background: #fff0f0; }

        /* ── FOOTER BUTTON ── */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255,255,255,0.97);
            padding: 14px 18px;
            box-shadow: 0 -2px 16px rgba(80,30,10,0.12);
            backdrop-filter: blur(4px);
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 11px;
            padding: 15px;
            width: 100%;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 14px rgba(78,15,15,0.35);
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-submit:active { opacity: 0.9; transform: scale(0.99); }
        .btn-submit:disabled {
            background: var(--disabled);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ── SEARCH INPUT ── */
        .search-wrap { position: relative; margin-bottom: 10px; }
        .search-wrap input { padding-left: 36px; margin-bottom: 0; }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .n-nombre, .n-marca { text-transform: uppercase; }
    </style>
</head>

 VILLA ELISA"><option value="LUISITO - YPANES"><option value="SUPERSEIS - AREGUA"><option value="SUPERSEIS - CAMBA CUA"><option value="SUPERSEIS - DENIS ROA"><option value="SUPERSEIS - EXPRESS MOLAS"><option value="SUPERSEIS - EXPRESS PRIMER PRESIDENTE"><option value="SUPERSEIS - EXPRESS RI BOQUERON"><option value="SUPERSEIS - FERNANDO"><option value="SUPERSEIS - GRAN UNION"><option value="SUPERSEIS - JAPON"><option value="SUPERSEIS - LA NEGRITA"><option value="SUPERSEIS - LAMBARE"><option value="SUPERSEIS - LAURELTY"><option value="SUPERSEIS - LOS LAURELES"><option value="SUPERSEIS - MADERO"><option value="SUPERSEIS - MBURUCUYA"><option value="SUPERSEIS - SAN LORENZO"><option value="SUPERSEIS - TOTAL"><option value="SUPERSEIS - VILLA MORRA"><option value="SUPERSEIS - SIRIO"><option value="SUPER - GUARANI"><option value="SUPERSEIS - ESPAÑA"><option value="SALEMMA - CARMELITAS"><option value="SALEMMA - FUENTE"><option value="SALEMMA - MULTIPLAZA"><option value="SALEMMA - SAN LORENZO"><option value="STOCK - 14 Y MEDIO"><option value="STOCK - ACCESO SUR"><option value="STOCK - AGRONOMO"><option value="STOCK - ARTIGAS"><option value="STOCK - AVELINO"><option value="STOCK - BARRIO OBRERO"><option value="STOCK - BOQUERON"><option value="STOCK - BRASILIA 1"><option value="STOCK - BRASILIA 2"><option value="STOCK - BRITEZ BORGES"><option value="STOCK - CAACUPE 1"><option value="STOCK - CAACUPE 2"><option value="STOCK - CALLE I"><option value="STOCK - CAPIATA R1"><option value="STOCK - CAPIATA R2"><option value="STOCK - CARRETERA"><option value="STOCK - DEFENSORES"><option value="STOCK - DOÑA BERTA"><option value="STOCK - EXPRESS 10 AGOSTO"><option value="STOCK - EXPRES FIGUEROA"><option value="STOCK - EXPRES TTE MOLAS"><option value="STOCK - EXPRESS ACOSTA ÑU"><option value="STOCK - EXPRESS AMERICO PICCO"><option value="STOCK - EXPRESS AVDA PARAGUAY"><option value="STOCK - YPANE"><option value="STOCK - ITAUGUA 1"><option value="STOCK - ITAUGUA 2"><option value="STOCK - GUARAMBARE"><option value="STOCK - J. AUGUSTO 1"><option value="STOCK - J. AUGUSTO 2"><option value="STOCK - MARIANO 1"><option value="STOCK - MARIANO 2"><option value="STOCK - UNICOMPRA">
        </datalist>
        <div class="error-msg" id="err-local">⚠️ Seleccione un local de la lista</div>

        <label>CIUDAD</label>
        <input type="text" id="ciudad" placeholder="Ej: Asunción">
    </div>

    <button class="btn-add" onclick="agregarNuevo()">+ AGREGAR NUEVO CORTE</button>
    <div id="contenedor-nuevos"></div>

    <div class="card">
        <div class="section-title">Listado de cortes</div>
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="buscador" placeholder="Buscar corte... Ej: Lomo" onkeyup="filtrar()">
        </div>
        <div id="lista-cortes"></div>
    </div>
</main>

<div class="footer">
    <button id="btnGuardar" class="btn-submit" onclick="validarYGuardar()">GUARDAR RELEVAMIENTO</button>
</div>

<script>
    const urlApp = "https://script.google.com/macros/s/AKfycbwsKGuK6ASxUDroetcY2mn_qlL9CkAqTL-VWvvL8kxJG7hCwBCwIQa5RKnHV8VbcNWSqQ/exec";
    const carnes = ["BOLA DE LOMO", "LOMO", "LOMO DE CERDO", "COSTILLA GRILL", "CARNAZA BLANCA", "CARNAZA NEGRA", "COSTILLA DE PRIMERA", "COSTILLA TIRA ANCHA", "LOMITO", "PECETO", "RABADILLA", "SOBRE COSTILLA (CARNAZA DE SEGUNDA )", "TORTUGUITA O SAMBARI", "VACIO A GRANEL", "TAPA CUADRIL", "COLITA CUADRIL", "BIFE DE CHORIZO", "VACIO", "OJO DE BIFE", "COSTILLA DE CERDO", "BONDIOLA  DE CERDO", "PERNIL (PIERNA DE CERDO)", "PALETA  DE CERDO", "CHULETA DE CERDO", "COSTILLA DE SEGUNDA"];

    function init() {
        const cont = document.getElementById('lista-cortes');
        carnes.forEach(c => {
            const div = document.createElement('div');
            div.className = 'item-carne';
            div.innerHTML = `
                <div class="corte-name">${c}</div>
                <div class="precios-row">
                    <div>
                        <div class="precio-label">Regular</div>
                        <input type="number" class="p-reg" placeholder="00000" oninput="validaInput(this)">
                        <div class="error-msg">Debe tener 5 o 6 números</div>
                    </div>
                    <div>
                        <div class="precio-label">Promo</div>
                        <input type="number" class="p-off" placeholder="00000" oninput="validaInput(this)">
                        <div class="error-msg">Debe tener 5 o 6 números</div>
                    </div>
                </div>`;
            cont.appendChild(div);
        });
        checkForm();
    }

    function validarLista(input, listId) {
        const list = document.getElementById(listId);
        const options = Array.from(list.options).map(opt => opt.value);
        const errorDiv = input.nextElementSibling;
        if (input.value !== "" && !options.includes(input.value)) {
            input.classList.add('invalid-selection');
            errorDiv.style.display = 'block';
        } else {
            input.classList.remove('invalid-selection');
            errorDiv.style.display = 'none';
        }
        checkForm();
    }

    function validaInput(el) {
        const row = el.closest('.precios-row');
        const regInput = row.querySelector('.p-reg');
        const offInput = row.querySelector('.p-off');
        const rVal = parseFloat(regInput.value) || 0;
        const oVal = parseFloat(offInput.value) || 0;
        const errReg = regInput.nextElementSibling;
        const errOff = offInput.nextElementSibling;
        errReg.style.display = 'none';
        errOff.style.display = 'none';
        regInput.style.borderColor = '';
        offInput.style.borderColor = '';
        if (regInput.value.length > 0 && (regInput.value.length < 5 || regInput.value.length > 6)) {
            errReg.style.display = 'block';
            regInput.style.borderColor = 'var(--error)';
        }
        if (offInput.value.length > 0 && (offInput.value.length < 5 || offInput.value.length > 6)) {
            errOff.style.display = 'block';
            offInput.style.borderColor = 'var(--error)';
        }
        if (rVal > 0 && oVal > 0 && oVal > rVal) {
            errOff.innerText = "⚠️ PROMO mayor al Regular";
            errOff.style.display = 'block';
            offInput.style.borderColor = 'var(--error)';
        }
        checkForm();
    }

    function checkForm() {
        const btn = document.getElementById('btnGuardar');
        const rel = document.getElementById('relevador').value;
        const loc = document.getElementById('local').value;
        const tieneErrores = Array.from(document.querySelectorAll('.error-msg')).some(e => e.style.display === 'block');
        const relInvalido = document.getElementById('relevador').classList.contains('invalid-selection');
        const locInvalido = document.getElementById('local').classList.contains('invalid-selection');
        btn.disabled = (!rel || !loc || tieneErrores || relInvalido || locInvalido);
        btn.innerText = (tieneErrores || relInvalido || locInvalido) ? "⚠️ CORREGIR DATOS" : "GUARDAR RELEVAMIENTO";
    }

    function filtrar() {
        const val = document.getElementById('buscador').value.toUpperCase();
        document.querySelectorAll('.item-carne').forEach(item => {
            const txt = item.querySelector('.corte-name').innerText.toUpperCase();
            item.style.display = txt.includes(val) ? "block" : "none";
        });
    }

    function agregarNuevo() {
        const id = Date.now();
        const div = document.createElement('div');
        div.className = 'card nuevo-corte-item';
        div.id = id;
        div.innerHTML = `
            <div class="section-title">Corte nuevo</div>
            <label>NOMBRE DEL CORTE</label>
            <input type="text" class="n-nombre" oninput="this.value = this.value.toUpperCase()" placeholder="Ej: ASADO ESPECIAL">
            <label>MARCA</label>
            <input type="text" class="n-marca" oninput="this.value = this.value.toUpperCase()" placeholder="Ej: DON PEDRO">
            <label>PRECIO</label>
            <input type="number" class="n-precio" placeholder="00000" oninput="validaInputNuevo(this)">
            <div class="error-msg">Debe tener 5 o 6 números</div>
            <button class="btn-eliminar" onclick="document.getElementById('${id}').remove(); checkForm();">✕ ELIMINAR</button>`;
        document.getElementById('contenedor-nuevos').appendChild(div);
        checkForm();
    }

    function validaInputNuevo(el) {
        const err = el.nextElementSibling;
        if (el.value.length > 0 && (el.value.length < 5 || el.value.length > 6)) {
            err.style.display = 'block';
            el.style.borderColor = 'var(--error)';
        } else {
            err.style.display = 'none';
            el.style.borderColor = '';
        }
        checkForm();
    }

    function validarYGuardar() {
        const btn = document.getElementById('btnGuardar');
        if (btn.disabled) return;

        btn.disabled = true;
        btn.innerText = "⏳ ENVIANDO RELEVAMIENTO...";

        const fijos = [];
        document.querySelectorAll('.item-carne').forEach(item => {
            const r = item.querySelector('.p-reg').value;
            const o = item.querySelector('.p-off').value;
            if(r || o) fijos.push({corte: item.querySelector('.corte-name').innerText, precioReg: r, precioOff: o});
        });
        const nuevos = [];
        document.querySelectorAll('.nuevo-corte-item').forEach(item => {
            const nom = item.querySelector('.n-nombre').value;
            const mar = item.querySelector('.n-marca').value;
            const pre = item.querySelector('.n-precio').value;
            if(nom && pre) nuevos.push({nombre: nom, marca: mar, precio: pre});
        });
        fetch(urlApp, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                relevador: document.getElementById('relevador').value,
                local: document.getElementById('local').value,
                ciudad: document.getElementById('ciudad').value,
                items: fijos,
                nuevos: nuevos
            })
        }).then(() => {
            alert("¡Guardado en MasMarkaAPP!");
            location.reload();
        }).catch(() => {
            alert("Error al enviar. Intente nuevamente.");
            btn.disabled = false;
            btn.innerText = "GUARDAR RELEVAMIENTO";
        });
    }
</script>
</body>
</html>
